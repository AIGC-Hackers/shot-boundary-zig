name: Release Web Package

on:
  push:
    branches:
      - main
    paths:
      - "web/package.json"
      - "web/bun.lock"
      - "web/src/shot-boundary.ts"
      - "web/src/lib/shot-boundary/**"
      - "web/scripts/prepare-package.mjs"
      - "web/tsconfig.lib.json"
      - "web/vite.lib.config.ts"
      - ".github/workflows/release-web-package.yml"
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  release:
    name: Build package tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Read package version
        id: version
        working-directory: web
        run: |
          version="$(bun -e 'const pkg = await Bun.file("package.json").json(); console.log(pkg.version)')"
          tag="web-v${version}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Stop if tag already exists
        id: check_tag
        run: |
          if git rev-parse -q --verify "refs/tags/${{ steps.version.outputs.tag }}" >/dev/null; then
            echo "Tag ${{ steps.version.outputs.tag }} already exists."
            echo "exists=true" >> "${GITHUB_OUTPUT}"
          else
            echo "exists=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Install dependencies
        if: steps.check_tag.outputs.exists != 'true'
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Validate package sources
        if: steps.check_tag.outputs.exists != 'true'
        working-directory: web
        run: |
          bun run typecheck
          bun test

      - name: Build package tree
        if: steps.check_tag.outputs.exists != 'true'
        working-directory: web
        run: bun run build:package

      - name: Smoke test package import
        if: steps.check_tag.outputs.exists != 'true'
        run: |
          smoke_dir="$(mktemp -d)"
          cp -R web/dist-package/. "${smoke_dir}/"
          cd "${smoke_dir}"
          bun install --no-save
          bun -e 'const mod = await import("./dist/shot-boundary.js"); if (typeof mod.analyzeVideo !== "function") throw new Error("missing analyzeVideo export")'

      - name: Create package tag
        if: steps.check_tag.outputs.exists != 'true'
        env:
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tmp="$(mktemp -d)"
          cp -R web/dist-package/. "${tmp}/"
          git -C "${tmp}" init
          git -C "${tmp}" config user.name "github-actions[bot]"
          git -C "${tmp}" config user.email "github-actions[bot]@users.noreply.github.com"
          git -C "${tmp}" add .
          git -C "${tmp}" commit -m "Release web package ${VERSION}"
          git -C "${tmp}" tag "${TAG}"
          git -C "${tmp}" push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "refs/tags/${TAG}"
